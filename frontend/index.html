<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Photo Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #4b5563;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6b7280;
      }
    </style>
  </head>
  <body
    class="bg-[#1e1e1e] text-gray-200 h-screen flex flex-col font-sans overflow-hidden"
  >
    <header
      class="bg-[#2d2d2d] px-6 py-4 flex justify-between items-center shadow-md z-10"
    >
      <div class="flex items-center gap-8">
        <button
          id="btn-scan"
          onclick="startScanning()"
          class="bg-[#2b5c92] hover:bg-[#3a75b8] transition px-6 py-2 rounded text-white font-semibold shadow"
        >
          Select Folder
        </button>

        <div class="flex gap-6">
          <label class="flex items-center gap-2 cursor-pointer">
            <input
              type="checkbox"
              id="chk-detect"
              checked
              class="w-4 h-4 accent-[#2b5c92]"
            />
            <span class="text-sm font-medium">Detect Faces</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="w-4 h-4 accent-[#2b5c92]" />
            <span class="text-sm font-medium"
              >Use Only Current Folder Content</span
            >
          </label>
        </div>
      </div>

      <button
        class="bg-[#2b5c92] hover:bg-[#3a75b8] transition px-6 py-2 rounded text-white font-semibold shadow"
      >
        Export Photos
      </button>
    </header>

    <div
      id="progress-container"
      class="hidden w-full bg-[#1e1e1e] border-b border-gray-700"
    >
      <div class="flex justify-between text-xs text-gray-400 px-6 py-1">
        <span id="progress-text"></span>
        <span id="progress-percent">0%</span>
      </div>
      <div class="h-1 w-full bg-gray-800">
        <div
          id="progress-bar"
          class="h-1 bg-green-500 transition-all duration-300"
          style="width: 0%"
        ></div>
      </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
      <aside
        class="w-80 bg-[#252526] flex flex-col border-r border-gray-700 shadow-xl z-0"
      >
        <div class="flex text-sm font-medium bg-[#1e1e1e]">
          <button class="flex-1 py-3 bg-[#2b5c92] text-white">People</button>
          <button
            class="flex-1 py-3 text-gray-400 hover:text-white hover:bg-[#2d2d2d] transition"
          >
            Location
          </button>
          <button
            class="flex-1 py-3 text-gray-400 hover:text-white hover:bg-[#2d2d2d] transition"
          >
            Time
          </button>
          <button
            class="flex-1 py-3 text-gray-400 hover:text-white hover:bg-[#2d2d2d] transition"
          >
            Others
          </button>
        </div>

        <div
          class="p-4 border-b border-gray-700 bg-[#2d2d2d] flex justify-between items-center"
        >
          <h2 class="text-sm font-semibold text-gray-300">Found People</h2>
          <div class="flex items-center gap-2">
            <label for="min-photos" class="text-xs text-gray-400"
              >Min photos per person:</label
            >
            <input
              type="number"
              id="min-photos"
              value="2"
              min="1"
              onchange="loadPeople()"
              class="w-12 bg-[#1e1e1e] text-white text-xs px-1 py-1 rounded border border-gray-600 focus:outline-none focus:border-[#2b5c92] transition"
            />
          </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-2" id="people-list">
          <p class="text-gray-500 text-center mt-10 text-sm">
            Loading people data...
          </p>
        </div>

        <div class="p-4 bg-[#252526] border-t border-gray-700">
          <button
            class="w-full bg-[#2b5c92] hover:bg-[#3a75b8] transition py-2 rounded text-sm text-white font-semibold shadow"
          >
            Reset All Filters
          </button>
        </div>
      </aside>

      <main class="flex-1 overflow-y-auto p-6 bg-[#1e1e1e] relative">
        <h2 class="text-center text-gray-400 font-medium mb-6">Photos</h2>

        <div
          class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-6"
          id="photo-grid"
        ></div>
      </main>
    </div>

    <script src="/frontend/js/people.js"></script>
    <script src="/frontend/js/photos.js"></script>
    <script src="/frontend/js/scanner.js"></script>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        loadPeople();
        loadPhotos();
      });
    </script>
  </body>
</html>
